name: warm-cache-bin

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

concurrency:
  group: warm-cache-bin-main
  cancel-in-progress: true

jobs:
  warm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore CI bin cache
        id: ci-bin-cache
        uses: actions/cache/restore@v5
        with:
          path: .cache/ci-bin
          key: ${{ runner.os }}-${{ runner.arch }}-ci-bin-${{ hashFiles('.github/scripts/install-ci-bin.sh') }}

      - name: Install CI binaries
        run: bash .github/scripts/install-ci-bin.sh .cache/ci-bin

      - name: Save CI bin cache
        if: steps.ci-bin-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .cache/ci-bin
          key: ${{ runner.os }}-${{ runner.arch }}-ci-bin-${{ hashFiles('.github/scripts/install-ci-bin.sh') }}
