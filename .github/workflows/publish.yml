name: publish
run-name: publish ${{ inputs.source-tag }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: 24

on:
  workflow_dispatch:
    inputs:
      source-tag:
        description: Release tag to publish.
        required: true
        type: string
      source-sha:
        description: Optional commit SHA that the release tag must point to.
        required: false
        type: string

concurrency:
  group: publish-${{ inputs.source-tag }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-slim
    outputs:
      sha: ${{ steps.release-ref.outputs.sha }}
    permissions:
      contents: read
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.source-sha || inputs.source-tag }}
          fetch-depth: 0

      - name: Validate release ref
        id: release-ref
        uses: lwmacct/260707-action-verified-tag-ref@main
        with:
          tag: ${{ inputs.source-tag }}
          sha: ${{ inputs.source-sha }}

  build-frontend:
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Build frontend assets
        env:
          VITE_APP_VERSION: ${{ inputs.source-tag }}
          PNPM_CONFIG_MINIMUM_RELEASE_AGE: "0"
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Upload frontend assets
        uses: actions/upload-artifact@v7.0.1
        with:
          name: build-frontend-dist
          path: dist
          if-no-files-found: error
          retention-days: 1

  build-backend:
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Setup Go
        uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build backend binary
        run: |
          set -euo pipefail
          mkdir -p bin
          CGO_ENABLED=1 go build \
            -trimpath \
            -ldflags='-s -w -linkmode external -extldflags "-static"' \
            -o bin/app .

      - name: Install UPX
        uses: lwmacct/260706-action-gh-release@main
        with:
          repository: upx/upx
          tag: v5.2.0
          asset: upx-5.2.0-amd64_linux.tar.xz
          binary: upx
          checksum: sha256:3db5d3294707439db97866feab8d75d800f028f48481a40547411824da4288a1
          cache: "true"

      - name: Compress backend binary
        run: |
          set -euo pipefail
          upx -9 bin/app
          bin/app version

      - name: Upload backend binary
        uses: actions/upload-artifact@v7.0.1
        with:
          name: build-backend-bin
          path: bin
          if-no-files-found: error
          retention-days: 1

  build-image:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-frontend
      - build-backend
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout release commit
        uses: actions/checkout@v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Download frontend assets
        uses: actions/download-artifact@v8.0.1
        with:
          name: build-frontend-dist
          path: .artifacts/frontend

      - name: Download backend binary
        uses: actions/download-artifact@v8.0.1
        with:
          name: build-backend-bin
          path: .artifacts/backend

      - name: Prepare image inputs
        run: |
          set -euo pipefail

          rm -rf bin dist
          mkdir -p bin dist

          _backend_app="$(find .artifacts/backend -type f -name app -print -quit)"
          _frontend_root="$(dirname "$(find .artifacts/frontend -type f -name index.html -print -quit)")"

          test -n "${_backend_app}"
          test -n "${_frontend_root}"

          install -m 0755 "${_backend_app}" bin/app
          cp -a "${_frontend_root}/." dist/

          test -x bin/app
          test -f dist/index.html

      - name: Docker metadata
        id: docker-meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.source-tag }}
            type=raw,value=latest

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Login to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.sha }}
            org.opencontainers.image.version=${{ inputs.source-tag }}

      - name: Print summary
        env:
          RELEASE_TAG: ${{ inputs.source-tag }}
          RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
          IMAGE_TAGS: ${{ steps.docker-meta.outputs.tags }}
        run: |
          {
            echo "## Publish summary"
            echo
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Tag | \`${RELEASE_TAG}\` |"
            echo "| Commit | \`${RELEASE_SHA}\` |"
            echo "| Image | \`${REGISTRY}/${IMAGE_NAME}\` |"
            echo
            echo "### Image tags"
            echo
            while IFS= read -r _tag; do
              echo "- \`${_tag}\`"
            done <<< "${IMAGE_TAGS}"
          } >> "${GITHUB_STEP_SUMMARY}"

  deploy:
    needs: build-image
    uses: ./.github/workflows/deploy.yml
    with:
      source-tag: ${{ inputs.source-tag }}
    secrets: inherit
