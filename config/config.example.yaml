# 默认配置示例文件, 此文件由单元测试生成, 请勿直接修改
# 复制此文件为 config.yaml 并根据需要修改

# 服务运行配置
server:

  # HTTP 服务配置
  http:
    listen: ":23198" # HTTP 服务监听地址

    # HTTPS TLS 配置
    tls:
      enabled: false # 是否启用 HTTPS TLS
      cert-file: "${APP_DATA:-.local/data}/ssl/fullchain.pem" # TLS 证书文件路径或 URI
      key-file: "${APP_DATA:-.local/data}/ssl/privkey.pem" # TLS 私钥文件路径或 URI
      poll-interval: 0s # TLS 证书文件重载兜底轮询间隔，未配置时使用默认间隔

    # Control API 认证配置
    auth:

      # 允许浏览器访问应用的可信 origin
      external-urls:
        - http://localhost:23199

      # 统一浏览器 Session 配置
      session:

        # Session encryption key ring; first key writes, all keys read
        keys:
          - id: "default" # Session key ID
            secret: "${AUTH_SESSION_KEY}" # Base64url-encoded 32-byte AES key
        ttl: 24h0m0s # Maximum browser session lifetime
        cookie-name: "" # Optional browser session cookie name

      # 启用的认证方式，可选 token、oidc
      methods:
        - token

      # Token 认证配置
      token:

        # Static access tokens keyed by credential ID
        credentials:
          admin:
            name: "Administrator" # Display name
            token-sha256: "${AUTH_TOKEN_SHA256}" # Lowercase hexadecimal SHA-256 digest of the complete access token

      # OIDC 认证配置
      oidc:
        issuer: "https://2008.s.lwmacct.com:20088" # Dex issuer URL
        client-id: "dproxy" # Dex OIDC client ID
        client-secret: "" # Dex confidential client secret；public client 留空

        # 允许访问应用的 GitHub 用户名
        allowed-users:
          - lwmacct
        session-ttl: 24h0m0s # OIDC 身份 Session 最长有效时间
    read-timeout: 30s # HTTP 读取超时时间
    write-timeout: 0s # HTTP 写入超时时间；代理流式响应建议保持 0
    idle-timeout: 2m0s # HTTP 空闲连接超时时间
    max-api-body-bytes: 1048576 # Control API 最大请求体字节数，0 表示不限制
    max-header-bytes: 131072 # HTTP 请求头最大字节数

# 代理配置
proxy:

  # 上游连接池与连接复用配置
  transport:
    max-idle-conns: 4096 # 全局空闲连接池容量；只影响连接复用，不限制活跃并发
    max-idle-conns-per-host: 2048 # 单 upstream 空闲连接池容量；只影响连接复用，不限制活跃并发
    max-conns-per-host: 0 # 单 upstream 活跃连接上限；0 表示不限制
    idle-conn-timeout: 1m0s # 空闲连接在连接池中的保留时间
    disable-keep-alives: false # 是否禁用上游 keep-alive

  # 等待上游响应时的人工重试配置
  retry:
    enabled: true # 是否启用等待响应请求的人工重试
    retryable-after: 10s # 单次上游请求等待多久后允许人工重试
    max-attempts: 3 # 单个逻辑请求允许的最大上游尝试次数，包含首次请求
    max-active-requests: 4096 # 同时等待上游最终响应的最大请求数
    temp-dir: "" # 可重放请求正文临时文件目录，留空使用系统临时目录
    max-body-bytes: 33554432 # 单个可重放请求正文最大字节数
    max-inflight-bytes: 1073741824 # 所有进行中请求正文临时文件的总字节上限

  # 请求生命周期 Fluentd 捕获配置
  capture:
    enabled: false # 是否将请求生命周期发送到 Fluentd
    instance-id: "" # 写入 capture 记录的代理实例标识，留空使用主机名
    body-chunk-bytes: 32768 # 请求和响应正文单条 capture 记录的最大字节数
    max-sse-event-bytes: 1048576 # 单条 SSE 语义事件解析缓冲上限

    # 需要脱敏的 HTTP header 名称或 glob
    redact-headers:
      - authorization
      - proxy-authorization
      - cookie
      - set-cookie
      - x-api-key
      - api-key

    # 需要脱敏的 URL query 参数名称或 glob
    redact-query:
      - access_token
      - api_key
      - apikey
      - key
      - token

    # Fluent Forward 输出配置
    fluent:
      network: "unix" # Fluent 网络类型：tcp、tls 或 unix
      host: "127.0.0.1" # Fluent TCP/TLS 主机
      port: 24224 # Fluent TCP/TLS 端口
      socket-path: "/run/fluent/fluent.sock" # Fluent Unix socket 路径
      connections: 4 # 按 trace ID 分片的同步 Fluent 连接数
      timeout: 500ms # Fluent 建连超时
      write-timeout: 500ms # Fluent 单条记录写入超时
      read-timeout: 500ms # Fluent ACK 读取超时
      retry-wait-millis: 100 # Fluent 首次重试等待毫秒数
      max-retry: 1 # Fluent 单条记录最大写入尝试次数
      max-retry-wait-millis: 500 # Fluent 重试等待上限毫秒数
      tag-prefix: "dproxy.capture" # Fluent tag 前缀
      request-ack: true # 是否要求 Fluentd 对每条记录确认
      tls-insecure-skip-verify: false # 是否跳过 Fluent TLS 证书验证，仅用于开发

  # 指令来源配置
  directive:
    max-token-bytes: 65536 # directive token 最大字节数
    max-inline-bytes: 49152 # inline directive JSON 最大字节数

    # Directive 入口来源白名单
    source-access:
      enabled: false # 是否启用 Directive 入口来源白名单

      # 允许访问的来源 IP、CIDR 或域名列表
      allowed-sources:
        - 127.0.0.1
        - ::1
        - 172.22.0.0/16

      # 可信反向代理 IP/CIDR 列表，仅这些来源可提供真实客户端 IP 头
      trusted-proxies: []

      # 域名来源规则的 DNS 缓存配置
      dns:
        lookup-timeout: 2s # 单次域名解析超时
        success-ttl: 1m0s # 域名成功解析结果缓存时间
        failure-ttl: 10s # 域名解析失败结果缓存时间
        stale-ttl: 10m0s # 解析失败后允许继续使用旧成功结果的最长时间
        max-hosts: 1024 # DNS 缓存的最大域名数量

    # 远程指令解析资源限制
    remote:
      timeout: 1s # 单次远程指令解析总超时
      max-response-bytes: 262144 # 远程 directive JSON 最大字节数

      # HTTP resolver 资源限制
      http:
        max-request-bytes: 131072 # HTTP resolver 请求元数据最大字节数

      # Redis adapter 资源限制
      redis:
        client-cache-capacity: 64 # 动态 Redis client 缓存容量
        client-idle-timeout: 10m0s # 动态 Redis client 空闲回收时间
        pool-size: 4 # 每个动态 Redis client 的连接池容量
