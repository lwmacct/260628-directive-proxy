# 默认配置示例文件, 此文件由单元测试生成, 请勿直接修改
# 复制此文件为 config.yaml 并根据需要修改

# 服务运行配置
server:

  # HTTP 服务配置
  http:
    listen: ":23198" # HTTP 服务监听地址

    # HTTPS TLS 配置
    tls:
      enabled: false # 是否在调用方中启用 TLS 证书热重载

      # TLS 证书来源列表
      certificates:
        - id: "default" # 证书的稳定标识
          certificate: "${APP_DATA:-.local/data}/ssl/fullchain.pem" # TLS 证书路径或 URI
          private-key: "${APP_DATA:-.local/data}/ssl/privkey.pem" # TLS 私钥路径或 URI
      default-certificate: "default" # 未匹配 SNI 时使用的证书 ID
      poll-interval: 5m0s # 证书来源兜底轮询间隔
      retry-interval: 2s # 证书重载失败后的重试间隔
      poll-jitter-ratio: 0.1 # 成功轮询后的向下随机抖动比例
      allow-insecure-http: false # 允许通过明文 HTTP 读取证书材料

    # Authme 指令工作台认证配置
    authme:
      path-prefix: "" # 认证 HTTP 路由前缀

      # 允许浏览器访问应用的可信 origin
      origins:
        - http://localhost:23199

      # 统一浏览器 Session 配置
      session:

        # Session encryption key ring; first key writes, all keys read
        keys:
          - id: "default" # Session key ID
            secret: "${AUTHME_SESSION_KEY}" # Base64url-encoded 32-byte AES key
        ttl: 0s # Maximum browser session lifetime
        cookie-name: "" # Optional browser session cookie name

      # Static token 认证配置
      statictoken:
        enabled: true # Whether to enable static token authentication
        id: "token" # Authentication method ID
        label: "Access token" # Authentication method display label

        # Static access token credentials
        credentials:
          - id: "admin" # Credential ID
            name: "Administrator" # Display name
            token: "${AUTHME_ACCESS_TOKEN}" # Opaque access token

      # Dex GitHub OIDC 认证配置
      dexgithub:
        enabled: false # Whether to enable Dex GitHub authentication
        id: "github" # Authentication method ID
        label: "GitHub" # Authentication method display label
        issuer: "https://2008.s.lwmacct.com:20088" # Dex OIDC issuer URL
        client-id: "dp" # OIDC client ID
        client-secret: "" # OIDC client secret
        session-ttl: 24h0m0s # Maximum browser session lifetime
        flow-ttl: 5m0s # Login flow lifetime

      # 允许访问应用的 GitHub 用户名
      allowed-github-users:
        - lwmacct

  # 代理配置
  proxy:

    # 出站 HTTP 连接池与连接复用配置
    transport:
      max-idle-conns: 4096 # 全局 HTTP 空闲连接池容量；只影响连接复用，不限制活跃并发
      max-idle-conns-per-host: 2048 # 单目标 HTTP 空闲连接池容量；只影响连接复用，不限制活跃并发
      max-conns-per-host: 0 # 单目标 HTTP 活跃连接上限；0 表示不限制
      idle-conn-timeout: 1m0s # HTTP 空闲连接在连接池中的保留时间

    # Directive Recovery Controller 全局资源上限
    recovery:
      max-round-trips-limit: 10 # Directive 可声明的最大 RoundTrip 数上限
      max-elapsed-limit: 2m0s # Directive 可声明的最大 Recovery 总时长
      max-callback-timeout: 5s # 单次 Recovery Controller 回调超时上限
      max-captured-body-bytes: 1048576 # 异常上游响应允许捕获的最大正文大小
      max-callback-response-bytes: 16384 # Recovery Controller 决策响应最大大小

    # 流式可重放请求正文的内存与磁盘配置
    body-store:
      memory-max-bytes: 536870912 # 所有活动 Replay Store 使用的最大内存字节数
      memory-per-body-bytes: 1048576 # 单个请求 spill 到磁盘前保留在内存的最大字节数
      disk-max-bytes: 8589934592 # 所有活动 Replay Store 使用的最大临时磁盘字节数
      max-body-bytes: 33554432 # 单个请求正文允许的最大实际字节数
      chunk-bytes: 65536 # 正文摄取和内存分段的 chunk 字节数
      temp-dir: "${APP_DATA:-.local/data}/tmp/body-store" # 匿名 spill 临时文件目录
      body-read-timeout: 30s # 读取请求正文的最长时间

    # 指令来源配置
    directive:
      token-secret: "${DIRECTIVE_TOKEN_SECRET:?directive token HMAC secret is required}" # directive token HMAC PSK
      max-token-bytes: 65536 # 完整 directive token 最大字节数

      # Directive 入口来源白名单
      source-access:
        enabled: false # 是否由调用方启用来源地址限制

        # IP、CIDR 或域名允许规则
        rules:
          - id: "" # 规则标识
            value: "127.0.0.1" # 允许的 IP、CIDR 或域名
          - id: "" # 规则标识
            value: "::1" # 允许的 IP、CIDR 或域名
          - id: "" # 规则标识
            value: "172.22.0.0/16" # 允许的 IP、CIDR 或域名

        # 域名解析与缓存配置
        dns:
          lookup-timeout: 2s # 单次域名解析超时
          success-ttl: 1m0s # 域名成功解析结果缓存时间
          failure-ttl: 10s # 域名解析失败结果缓存时间
          stale-ttl: 10m0s # 解析失败后允许继续使用旧成功结果的最长时间
          max-hosts: 1024 # DNS 缓存的最大域名数量

        # 可信反向代理 IP 或 CIDR 列表
        trusted-proxies: []

        # 按优先级启用的客户端地址转发头
        headers:
          - forwarded
          - x-forwarded-for
          - x-real-ip
        max-header-bytes: 8192 # 转发头允许的最大字节数
        max-hops: 16 # 代理链允许的最大地址数量

      # 远程指令解析资源限制
      remote:
        timeout: 1s # 单次远程指令解析总超时
        max-payload-bytes: 262144 # 远程 directive Payload 最大字节数

        # Redis adapter 资源限制
        redis:
          client-cache-capacity: 64 # 动态 Redis client 缓存容量
          client-idle-timeout: 10m0s # 动态 Redis client 空闲回收时间
          pool-size: 4 # 每个动态 Redis client 的连接池容量

        # File adapter 根目录配置
        file:
          root: "${APP_DATA:-.local/data}/directives" # File directive 相对路径的读取根目录

  # Fluent Forward 事件输出配置；关闭时不创建 Sink、Queue 或连接
  fluent:
    enabled: false # Enable Fluent client in the calling application
    endpoint: "${FLUENT_ENDPOINT:-tcp://127.0.0.1:23194}" # Fluent endpoint using tcp, tls, unix, ws, or wss

    # Forward authentication settings
    auth: null
    tag-prefix: "dp" # Prefix added to every event tag
    ack: false # Require Forward acknowledgements

    # Buffer and automatic batching settings
    buffer:
      max-events: 8192 # Maximum number of unfinished events
      max-bytes: 67108864 # Maximum encoded bytes held by unfinished events
      batch-max-events: 256 # Maximum number of events in one wire batch
      batch-max-bytes: 1048576 # Maximum encoded bytes in one wire batch
      batch-wait: 5ms # Maximum wait for collecting an automatic batch

    # Delivery retry settings
    retry:
      max-attempts: 5 # Maximum number of delivery attempts
      min-backoff: 100ms # Minimum delay between delivery attempts
      max-backoff: 5s # Maximum delay between delivery attempts

    # Connection and I/O timeout settings
    timeout:
      connect: 3s # Timeout for complete transport connection setup
      handshake: 3s # Timeout for the Forward authentication handshake
      write: 3s # Timeout for writing one wire batch
      ack: 3s # Timeout for receiving one Forward acknowledgement
    compression-threshold: 0 # Minimum packed bytes required for gzip compression

    # TLS and mutual TLS settings
    tls:
      ca-file: "" # PEM file containing trusted server certificate authorities
      certificate-file: "" # PEM client certificate file for mutual TLS
      key-file: "" # PEM client private key file for mutual TLS
      server-name: "" # TLS server name used for certificate verification
      min-version: "" # Minimum TLS version: 1.2 or 1.3
      insecure-skip-verify: false # Skip TLS server certificate verification

    # WebSocket upgrade settings
    websocket:

      # Static HTTP headers sent during the WebSocket upgrade
      header: []
