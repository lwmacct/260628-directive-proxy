server:
  debug: false
  http:
    listen: ":40174"
    read-timeout: 30s
    write-timeout: 0s
    idle-timeout: 120s
    max-api-body-bytes: 1048576
    tls:
      enabled: false
      cert-file: "${APP_DATA:-.local/data}/ssl/fullchain.pem"
      key-file: "${APP_DATA:-.local/data}/ssl/privkey.pem"
      auto-reload: true
      reload-interval: 3s

proxy:
  path-prefix: "/proxy"
  transport:
    max-idle-conns: 4096
    max-idle-conns-per-host: 2048
    max-conns-per-host: 0
    idle-conn-timeout: 60s
    disable-keep-alives: false

event:
  kafka:
    enabled: false
    capture-abnormal: true
    ensure-topics: true
    brokers: "${KAFKA_BROKERS:-localhost:9092}"
    topic-prefix: "${KAFKA_TOPIC_PREFIX:-prod.directive-proxy}"
    publish-timeout: 10s
    max-publish-retries: 3
    sasl:
      username: "${KAFKA_SASL_USERNAME}"
      password: "${KAFKA_SASL_PASSWORD}"

plugins:
  usage:
    enabled: true
    mode: "include"
    fields:
      - id
      - model
      - completed_at
      - created_at
      - tool_choice
      - top_logprobs
      - top_p
      - usage
      - reasoning
    delivery:
      enabled: true
      kafka: true
      url: "${USAGE_DELIVERY_URL:-http://localhost:40177/api/metering/events}"
      token: "${USAGE_INGEST_TOKEN}"
      max-backlog: 1000
      flush-interval: 5s
      batch-size: 10
      timeout: 10s
